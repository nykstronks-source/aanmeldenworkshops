<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Workshop aanmelding</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f5f4f0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a}
.app{max-width:640px;margin:0 auto;padding:2rem 1rem 4rem}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:2rem}
.steps{display:flex;align-items:flex-start;margin-bottom:2rem}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:13px;left:calc(50% + 14px);right:calc(-50% + 14px);height:2px;background:#d4d4c8}
.step:not(:last-child).done::after{background:#1a1a1a}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid #d4d4c8;background:#f5f4f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#999;position:relative;z-index:1}
.step.active .step-dot{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.step.done .step-dot{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.step-label{font-size:11px;color:#999;margin-top:6px;text-align:center;line-height:1.3}
.step.active .step-label{color:#1a1a1a;font-weight:600}
.step.done .step-label{color:#555}
.card{background:#fff;border:1px solid #d4d4c8;border-radius:12px;padding:1.5rem;margin-bottom:12px}
.section-title{font-size:17px;font-weight:600;margin-bottom:4px}
.section-sub{font-size:13px;color:#666;margin-bottom:1.25rem}
.form-row{margin-bottom:14px}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
label{display:block;font-size:13px;color:#555;margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid #d4d4c8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid #1a1a1a;outline-offset:-1px;border-color:#1a1a1a}
input.err{border-color:#c0392b}
textarea{resize:vertical;min-height:64px}
.ferr{font-size:12px;color:#c0392b;margin-top:4px}
.radio-group{display:flex;gap:10px;flex-wrap:wrap}
.radio-opt{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:8px;border:1px solid #d4d4c8;cursor:pointer;font-size:14px;user-select:none}
.radio-opt:hover{border-color:#888;background:#f5f4f0}
.radio-opt.on{border:2px solid #1a1a1a;background:#f0efec}
.rdot{width:16px;height:16px;border-radius:50%;border:1.5px solid #aaa;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rdot.on{border-color:#1a1a1a;background:#1a1a1a}
.rdot.on::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;display:block}
.time-block{margin-bottom:1.5rem}
.time-label{font-size:13px;font-weight:600;color:#555;margin-bottom:8px;padding:4px 0;border-bottom:1px solid #d4d4c8}
.scard{background:#fff;border:1px solid #d4d4c8;border-radius:12px;padding:1rem;margin-bottom:8px;cursor:pointer;user-select:none}
.scard:hover:not(.off){border-color:#888;background:#fafaf8}
.scard.on{border:2px solid #1a1a1a;background:#f0efec}
.scard.off{opacity:.35;cursor:not-allowed;pointer-events:none}
.sc-top{display:flex;align-items:flex-start;gap:10px}
.chk{width:20px;height:20px;border-radius:50%;border:1.5px solid #aaa;flex-shrink:0;margin-top:1px;position:relative}
.chk.on{background:#1a1a1a;border-color:#1a1a1a}
.chk.on::after{content:'';position:absolute;left:5px;top:2px;width:6px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.sc-title{font-weight:600;font-size:14px}
.sc-desc{font-size:13px;color:#555;margin-top:3px;line-height:1.55}
.sc-meta{font-size:12px;color:#888;margin-top:5px;display:flex;gap:12px;flex-wrap:wrap}
.sbar{height:4px;background:#e8e8e8;border-radius:2px;margin-top:8px}
.sfill{height:4px;border-radius:2px;background:#107c10}
.sfill.full{background:#d13438}
.sfill.almost{background:#ca5010}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:500}
.badge.green{background:#dff6dd;color:#107c10}
.badge.red{background:#fde7e9;color:#a4262c}
.badge.amber{background:#fff4ce;color:#7a4d00}
.badge.blue{background:#deecf9;color:#004578}
.badge.purple{background:#e8d7f6;color:#4b1fa6}
.badge.teal{background:#dff6dd;color:#004b1c}
.notitle{font-style:italic;color:#aaa;font-size:13px}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;background:#1a1a1a;color:#fff;margin-top:8px;font-family:inherit}
.btn:hover:not(:disabled){background:#333}
.btn:disabled{background:#e8e8e8;color:#aaa;cursor:not-allowed}
.btn-back{background:transparent;border:none;color:#555;font-size:14px;cursor:pointer;padding:0;margin-bottom:1rem;display:inline-flex;align-items:center;gap:4px;font-family:inherit}
.btn-back:hover{color:#1a1a1a}
.hint{font-size:13px;color:#666;text-align:center;margin-top:12px;margin-bottom:4px}
.hint.ok{color:#107c10;font-weight:500}
.errmsg{padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:14px;background:#fde7e9;color:#a4262c;border:1px solid #f4c2c5}
.confirm-wrap{text-align:center;padding:1.5rem 0}
.confirm-icon{width:64px;height:64px;border-radius:50%;background:#dff6dd;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:28px;color:#107c10}
.confirm-title{font-size:20px;font-weight:600;margin-bottom:8px}
.confirm-sub{font-size:14px;color:#555;margin-bottom:1.5rem;line-height:1.6}
.confirm-session{background:#f5f4f0;border-radius:10px;padding:1rem;margin-bottom:8px;text-align:left}
.confirm-session-nr{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.confirm-session-title{font-weight:600;font-size:15px;margin-bottom:6px}
.confirm-session-meta{font-size:12px;color:#666;display:flex;gap:10px;flex-wrap:wrap}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:8px;border:1px solid #d4d4c8;background:transparent;cursor:pointer;font-size:14px;color:#555;font-family:inherit}
.tab:hover{background:#e8e8e8}
.tab.active{background:#e8e8e8;color:#1a1a1a;border-color:#888;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.stat-card{background:#e8e8e8;border-radius:8px;padding:1rem;text-align:center}
.stat-card .num{font-size:24px;font-weight:600}
.stat-card .lbl{font-size:13px;color:#555;margin-top:4px}
.atable{width:100%;border-collapse:collapse;font-size:13px}
.atable th{text-align:left;padding:8px 10px;border-bottom:1px solid #d4d4c8;color:#555;font-weight:600;white-space:nowrap}
.atable td{padding:8px 10px;border-bottom:1px solid #d4d4c8;vertical-align:top}
.editform{background:#f5f4f0;border-radius:8px;padding:1rem;margin-top:8px}
.sbtn{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid #aaa;background:transparent;cursor:pointer;font-family:inherit}
.sbtn:hover{background:#e8e8e8}
.sbtn.dark{background:#1a1a1a;color:#fff;border:none}
.sbtn.danger{color:#a4262c;border-color:#f4c2c5}
.row{display:flex;gap:8px}
.pin-wrap{max-width:320px;margin:2rem auto;text-align:center}
.detail-screen{background:#f5f4f0}
.detail-nr{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.detail-title{font-size:22px;font-weight:600;margin-bottom:10px;line-height:1.3}
.detail-meta{font-size:13px;color:#555;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #d4d4c8}
.detail-desc{font-size:15px;color:#333;line-height:1.7;margin-bottom:2rem}
</style>
</head>
<body>
<div class="app" id="root"></div>
<script>
var MAX=4,STUDIES=['POP','CA','EMUS'],SB={POP:'blue',CA:'purple',EMUS:'teal'};
var DS=[
  {id:'s1',time:'10:00 \u2013 11:30',lokaal:'BK.01',docenten:'Lisa Brieder & Sterre Koning',title:'De Verbeeldingsfabriek',desc:'Stap binnen in de verbeeldingsfabriek en ontdek hoe je teksten kunt schrijven als nooit tevoren. Meester de kunst van het schrijven van metaforen en het meeslepen van de lezer in je verhaal.'},
  {id:'s13',time:'10:00 \u2013 11:30',lokaal:'BK.02',docenten:'Joep Smulders & Leeroy Zschuschen',title:'Van Idee naar Demo',desc:'Zit jij vol muzikale ide\u00ebn maar heb je moeite met deze uitwerken in een sterke demo? In deze workshop leer je snel en effectief je ide\u00ebn vast te leggen en uit te werken in een productie. Zo til jij jouw demo\u2019s naar een hoger niveau! Voor muzikanten.'},
  {id:'s3',time:'10:00 \u2013 11:30',lokaal:'B0.32',docenten:'Lars Gerritse & Lenny van Haarlem',title:'Beperk je oren, vergroot de muziek',desc:'In deze workshop onderzoeken studenten hoe muzikale creativiteit kan ontstaan door bewuste beperkingen. In kleine groepjes maken ze zonder technologie een korte compositie met alleen stem, lichaam of objecten. Door te luisteren, te experimenteren en keuzes te maken ervaren ze hoe je met minimale middelen betekenisvolle muziek kunt cre\u00ebren.'},
  {id:'s4',time:'10:00 \u2013 11:30',lokaal:'BK.03',docenten:'Niels van Arnhem & Stan van Itterzon',title:'Soleren Kan Je Zo Leren',desc:'Wil jij nooit meer in paniek raken wanneer je voor het blok wordt gezet op het podium? Ontdek methodes die je kunnen helpen bij het improviseren van solo\u2019s en het opbouwen van je muzikale vocabulaire.'},
  {id:'s5',time:'12:00 \u2013 13:30',lokaal:'BK.01',docenten:'Dean Molenkamp & Sushanti Sidhi Maruti',title:'Moduleren kun je Leren',desc:'Verhoog jouw muzikale spice tolerantie met de pittige kracht van moduleren! In deze workshop leer je het toepassen van twee modulaties die jouw creaties kunnen opfleuren, met extra uitdaging voor zij die krachtigere smaken aankunnen. Neem je instrument mee!'},
  {id:'s6',time:'12:00 \u2013 13:30',lokaal:'BK.02',docenten:'Talore Carrilho & Jim Feenstra',title:'Organize Your Sh*t',desc:'Turn your digital mess into musical magic. Een panel over het organiseren van je digitale workflow: bestanden, workspaces, DJ-folders en productieprojecten.'},
  {id:'s7',time:'12:00 \u2013 13:30',lokaal:'B0.32',docenten:'Jada Sluisdom & Nanice Michiels',title:'Metaforisch schrijven',desc:'Hoe beginnend je misschien ook bent, bij deze workshop gaan we metaforen in muziek analyseren en er zelf mee aan de slag. Dus als je van songwriting en lyrics schrijven houdt, zit je hier goed!'},
  {id:'s8',time:'12:00 \u2013 13:30',lokaal:'BK.03',docenten:'Luuk Huitenga & Jens Matser',title:'Toan zit in de geyr',desc:'Leer bewust te worden van je eigen sound in live en studio situaties met behulp van de spullen die je zelf bezit. Een masterclass voor bassisten & toetsenisten en andere ge\u00efnteresseerden. #TOB'},
  {id:'s9',time:'14:00 \u2013 15:30',lokaal:'BK.01',docenten:'Christiaan Klootwijk & Sebas Potters',title:'Creative Layering: Advanced DJ Workshop',desc:'In deze hands-on workshop laten we deelnemers kennismaken met het layeren van tracks tijdens een DJ-set op creatieve manieren \u2014 denk aan acapella\u2019s, instrumentals en texture layering.'},
  {id:'s10',time:'14:00 \u2013 15:30',lokaal:'BK.02',docenten:'Gwen Kaihatu & Dirk Jonker',title:'Geef geen Fock om je Writers-block!',desc:'Loop je soms vast tijdens het schrijven van een song? In deze workshop duiken we in het fenomeen writers-block en ontdek je waarom het creatieve proces soms kan stagneren. Je krijgt nieuwe inzichten in hoe creativiteit werkt en hoe je jezelf weer in beweging kunt krijgen. Ideaal voor songwriters die hun creatieve flow beter willen begrijpen en doorbreken!'},
  {id:'s11',time:'14:00 \u2013 15:30',lokaal:'B0.32',docenten:'Lucian Verheij & Silvester van der Meer',title:'Lyrics maken met je favoriete film, serie of boek',desc:'In deze workshop leer je hoe je inspiratie kunt halen uit je favoriete boek, film of serie voor je songteksten. Na een uitleg en voorbeelden ga je zelf aan de slag met de uitgelegde methodes.'},
  {id:'s12',time:'14:00 \u2013 15:30',lokaal:'BK.03',docenten:'Merijn Jansen & Lars Doornkamp',title:'Rhythm van de Timing',desc:'Het leren herkennen van ritmische notatie en het oefenen ervan op een effici\u00ebnte manier.'},
  {id:'s2',time:'16:00 \u2013 17:30',lokaal:'BK.01',docenten:'Lesley Bruining & Mathis Helsen',title:'Blind Relay Production',desc:'We maken groepjes van 3 en om de beurt mag er een andere producer aan het project werken \u2014 maar men mag niet overleggen met elkaar. Voor e-musicanten.'},
  {id:'s14',time:'16:00 \u2013 17:30',lokaal:'BK.02',docenten:'Lieke Jacobs & Ilja Boor',title:'Dolby Atmos & Ruimte in je Mix',desc:'Lieke geeft een introductie over Dolby Atmos mixen in Logic Pro en legt de basisprincipes uit. Ilja presenteert vervolgens een experiment over het gebruik van ruimte en reverb in mixes, en hoe je deze elementen inzet om verschillende ruimtes te cre\u00ebren en te manipuleren. Gegeven in de kleine studio.'}
];
var SUPABASE_URL='https://pdxuccqhmxdkqrbqaayv.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkeHVjY3FobXhka3FyYnFhYXl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjI2OTIsImV4cCI6MjA4OTQ5ODY5Mn0.OSyGCDvkuwODalF7Kw0lW9FIT6J3h3S4QZ1JhMMGMLw';

function sbFetch(path,opts){
  return fetch(SUPABASE_URL+'/rest/v1/'+path,Object.assign({headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'}},opts));
}

var _m={};
function lsGet(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return _m[k]!==undefined?_m[k]:fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){_m[k]=v;}}

var st={view:'student',step:1,form:{voornaam:'',achternaam:'',studie:'',ws1:'',ws2:''},errors:{},msg:null,submitting:false,loading:true,sessions:JSON.parse(JSON.stringify(DS)),regs:[],lastReg:null,popup:null,popupType:null,adminAuth:false,adminPin:lsGet('ws_pin','2547'),adminTab:'overview',editId:null,editDraft:{},fTime:'all',fStudy:'all',pinMsg:null,pinSaveMsg:null};

function sid(id){for(var i=0;i<st.sessions.length;i++)if(st.sessions[i].id===id)return st.sessions[i];return null;}
function times(){var s={},r=[];for(var i=0;i<st.sessions.length;i++)if(!s[st.sessions[i].time]){s[st.sessions[i].time]=1;r.push(st.sessions[i].time);}return r;}
function spots(id){var n=0;for(var i=0;i<st.regs.length;i++)if(st.regs[i].s1_id===id||st.regs[i].s2_id===id)n++;return MAX-n;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function validate(){var e={},f=st.form;if(!f.voornaam.trim())e.voornaam='Vul je voornaam in';if(!f.achternaam.trim())e.achternaam='Vul je achternaam in';if(!f.studie)e.studie='Kies je studie';return e;}
function alreadyReg(){var vn=st.form.voornaam.trim().toLowerCase(),an=st.form.achternaam.trim().toLowerCase();for(var i=0;i<st.regs.length;i++)if(st.regs[i].voornaam.toLowerCase()===vn&&st.regs[i].achternaam.toLowerCase()===an)return true;return false;}

function loadRegs(){
  return sbFetch('aanmeldingen?select=*').then(function(r){return r.json();}).then(function(data){
    if(Array.isArray(data))st.regs=data;
    st.loading=false;
    render();
  }).catch(function(){st.loading=false;render();});
}
function finish(){
  if(st.submitting)return;
  st.submitting=true;render();
  var s1=sid(st.form.ws1),s2=sid(st.form.ws2);
  var row={
    voornaam:st.form.voornaam.trim(),
    achternaam:st.form.achternaam.trim(),
    studie:st.form.studie,
    s1_id:s1.id,s1_titel:s1.title||s1.lokaal,s1_tijd:s1.time,s1_lokaal:s1.lokaal,
    s2_id:s2.id,s2_titel:s2.title||s2.lokaal,s2_tijd:s2.time,s2_lokaal:s2.lokaal
  };
  sbFetch('aanmeldingen',{method:'POST',body:JSON.stringify(row)})
  .then(function(r){return r.json();})
  .then(function(data){
    var saved=Array.isArray(data)?data[0]:data;
    st.regs.push(saved||row);
    st.lastReg=saved||row;
    st.submitting=false;st.step=4;render();
  }).catch(function(){
    st.submitting=false;
    st.msg='Er ging iets mis. Probeer opnieuw.';render();
  });
}
function render(){
  document.getElementById('root').innerHTML=buildHTML();
  attach();
  window.scrollTo(0,0);
  try{window.parent.postMessage({iframeHeight:document.body.scrollHeight},'*');}catch(e){}
}
function buildHTML(){return st.view==='admin'?adminView():studentView();}
function buildPopup(){var s=st.popup,isFinal=st.popupType==='ws2';return'<div class="popup-overlay" onclick="closePopup(event)"><div class="popup-box"><div class="popup-nr">'+(isFinal?'Workshop 2 gekozen':'Workshop 1 gekozen')+'</div><div class="popup-title">'+esc(s.title||s.lokaal)+'</div><div class="popup-meta"><span>&#128197; '+s.time+'</span><span>&#128205; '+s.lokaal+'</span><span>&#128100; '+s.docenten+'</span></div>'+(s.desc?'<div class="popup-desc">'+esc(s.desc)+'</div>':'')+'<button class="popup-btn" onclick="'+(isFinal?'confirmFinish()':'confirmNext()') +'">'+(isFinal?'Aanmelding voltooien':'Volgende \u2014 kies workshop 2')+'</button><button class="popup-close" onclick="dismissPopup()">Andere keuze maken</button></div></div>';}
function studentView(){
  if(st.loading) return '<div style="text-align:center;padding:3rem;color:#888;font-size:14px">Aanmeldingen laden&#8230;</div>';
  if(st.popup) return buildDetailScreen();
  var h='<h1>Workshop aanmelding</h1><p class="sub">Schrijf je in voor twee workshopsessies</p>';
  if(st.step<4)h+=stepsBar();
  if(st.step===1)h+=step1();
  else if(st.step===2)h+=step2();
  else if(st.step===3)h+=step3();
  else h+=step4();
  h+='<div style="margin-top:3rem;text-align:center"><button style="background:none;border:none;color:#ccc;font-size:11px;cursor:pointer;font-family:inherit" onclick="V(\'admin\')">beheerder</button></div>';
  return h;
}
function buildDetailScreen(){
  var s=st.popup,isFinal=st.popupType==='ws2';
  return '<div class="detail-screen">'
    +'<button class="btn-back" onclick="dismissPopup()">&#8592; Andere keuze</button>'
    +'<div class="detail-nr">'+(isFinal?'Workshop 2':'Workshop 1')+'</div>'
    +'<div class="detail-title">'+esc(s.title||s.lokaal)+'</div>'
    +'<div class="detail-meta">'
    +'<span>&#128197; '+s.time+'</span>'
    +'<span>&#128205; '+s.lokaal+'</span>'
    +'<span>&#128100; '+s.docenten+'</span>'
    +'</div>'
    +(s.desc?'<div class="detail-desc">'+esc(s.desc)+'</div>':'')
    +'<button class="btn" onclick="'+(isFinal?'confirmFinish()':'confirmNext()') +'">'
    +(isFinal?'Aanmelding voltooien':'Volgende \u2014 kies workshop 2')
    +'</button>'
    +'</div>';
}
function stepsBar(){var l=['Gegevens','Workshop 1','Workshop 2'],h='<div class="steps">';for(var i=0;i<l.length;i++){var n=i+1,c=st.step>n?'done':st.step===n?'active':'';h+='<div class="step '+c+'"><div class="step-dot">'+(st.step>n?'&#10003;':n)+'</div><div class="step-label">'+l[i]+'</div></div>';}return h+'</div>';}
function step1(){var f=st.form,e=st.errors;return'<div class="card"><div class="section-title">Jouw gegevens</div><div class="section-sub">Vul je naam in en kies je studie</div>'+(st.msg?'<div class="errmsg">'+st.msg+'</div>':'')+'<div class="form-row2"><div><label>Voornaam</label><input id="i-vn" type="text" placeholder="Voornaam" value="'+esc(f.voornaam)+'" class="'+(e.voornaam?'err':'')+'">'+(e.voornaam?'<div class="ferr">'+e.voornaam+'</div>':'')+'</div><div><label>Achternaam</label><input id="i-an" type="text" placeholder="Achternaam" value="'+esc(f.achternaam)+'" class="'+(e.achternaam?'err':'')+'">'+(e.achternaam?'<div class="ferr">'+e.achternaam+'</div>':'')+'</div></div><div class="form-row"><label>Studie</label><div class="radio-group">'+STUDIES.map(function(s){return'<div class="radio-opt '+(f.studie===s?'on':'')+'" onclick="SS(\''+s+'\')" tabindex="0"><div class="rdot '+(f.studie===s?'on':'')+'"></div><span>'+s+'</span></div>';}).join('')+'</div>'+(e.studie?'<div class="ferr">'+e.studie+'</div>':'')+'</div><button class="btn" onclick="next1()">Volgende &rarr;</button></div>';}
function scards(selId,onFn,bt){var h='',ts=times();for(var ti=0;ti<ts.length;ti++){var t=ts[ti];if(bt&&t===bt)continue;h+='<div class="time-block"><div class="time-label">'+t+'</div>';for(var si=0;si<st.sessions.length;si++){var s=st.sessions[si];if(s.time!==t)continue;var isSel=selId===s.id,left=spots(s.id),full=left<=0&&!isSel,pct=Math.round(((MAX-left)/MAX)*100),fc=left===0?'full':left<=2?'almost':'',bc=left===0?'red':left<=2?'amber':'green';h+='<div class="scard '+(isSel?'on':full?'off':'')+'" onclick="'+onFn+'(\''+s.id+'\')" tabindex="0"><div class="sc-top"><div class="chk '+(isSel?'on':'')+'"></div><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1">'+(s.title?'<div class="sc-title">'+esc(s.title)+'</div>':'<div class="notitle">Nog geen titel</div>')+(s.desc?'<div class="sc-desc">'+esc(s.desc)+'</div>':'')+'</div><span class="badge '+bc+'" style="white-space:nowrap;flex-shrink:0">'+(left===0?'Vol':left+' vrij')+'</span></div><div class="sc-meta"><span>&#128205; '+s.lokaal+'</span><span>&#128100; '+s.docenten+'</span></div><div class="sbar"><div class="sfill '+fc+'" style="width:'+pct+'%"></div></div></div></div></div>';}h+='</div>';}return h;}
function step2(){var sel=st.form.ws1;return'<button class="btn-back" onclick="GS(1)">&#8592; Terug</button><div class="card"><div class="section-title">Kies je eerste workshop</div><div class="section-sub">Selecteer &eacute;&eacute;n sessie</div></div>'+scards(sel,'W1',null)+'<p class="hint '+(sel?'ok':'')+'">'+( sel?'Workshop 1 gekozen \u2014 klik Volgende':'Klik op een sessie om te kiezen')+'</p><button class="btn" onclick="next2()" '+(sel?'':'disabled')+'>Volgende &rarr;</button>';}
function step3(){var sel=st.form.ws2,s1=sid(st.form.ws1),bt=s1?s1.time:null;return'<button class="btn-back" onclick="GS(2)">&#8592; Terug</button><div class="card"><div class="section-title">Kies je tweede workshop</div><div class="section-sub">Het tijdslot van workshop 1 is niet beschikbaar</div></div>'+scards(sel,'W2',bt)+'<p class="hint '+(sel?'ok':'')+'">'+( sel?'Beide workshops geselecteerd':'Klik op een sessie om te kiezen')+'</p><button class="btn" onclick="finish()" '+(sel&&!st.submitting?'':'disabled')+'>'+( st.submitting?'Bezig\u2026':'Aanmelding voltooien')+'</button>';}
function step4(){
  var r=st.lastReg;if(!r)return'';
  return'<div class="card"><div class="confirm-wrap"><div class="confirm-icon">&#10003;</div><div class="confirm-title">Gelukt, '+esc(r.voornaam)+'!</div><div class="confirm-sub">Je bent aangemeld voor de volgende twee workshops:</div><div style="width:100%">'
  +'<div class="confirm-session"><div class="confirm-session-nr">Workshop 1</div><div class="confirm-session-title">'+esc(r.s1_titel)+'</div><div class="confirm-session-meta"><span>&#128197; '+r.s1_tijd+'</span><span>&#128205; '+r.s1_lokaal+'</span></div></div>'
  +'<div class="confirm-session"><div class="confirm-session-nr">Workshop 2</div><div class="confirm-session-title">'+esc(r.s2_titel)+'</div><div class="confirm-session-meta"><span>&#128197; '+r.s2_tijd+'</span><span>&#128205; '+r.s2_lokaal+'</span></div></div>'
  +'</div><button class="btn" style="margin-top:1.5rem" onclick="wijzigKeuzes()">Keuzes wijzigen</button>'
  +'<button class="btn" style="margin-top:10px;background:#fff;color:#1a1a1a;border:1px solid #d4d4c8" onclick="reset()">Nieuwe aanmelding</button>'
  +'</div></div>';
}
function adminView(){var h='<h1>Beheerder</h1><p class="sub">Workshop aanmeldsysteem</p>';if(!st.adminAuth){return h+'<div class="pin-wrap"><h2 style="font-size:18px;font-weight:600;margin-bottom:8px">Inloggen</h2><p style="margin-bottom:1rem;color:#555;font-size:14px">Voer de pincode in</p>'+(st.pinMsg?'<div class="errmsg">'+st.pinMsg+'</div>':'')+'<div class="form-row"><input id="i-pin" type="password" placeholder="Pincode" maxlength="8" style="text-align:center;font-size:22px;letter-spacing:8px"></div><button class="btn" onclick="PIN()" style="margin-top:8px">Inloggen</button></div><div style="margin-top:1.5rem;text-align:center"><button style="background:none;border:none;color:#bbb;font-size:12px;cursor:pointer;font-family:inherit" onclick="V(\'student\')">&#8592; Terug</button></div>';}h+='<div class="tabs"><button class="tab '+(st.adminTab==='overview'?'active':'')+'" onclick="AT(\'overview\')">Aanmeldingen</button><button class="tab '+(st.adminTab==='sessies'?'active':'')+'" onclick="AT(\'sessies\')">Sessies</button><button class="tab '+(st.adminTab==='settings'?'active':'')+'" onclick="AT(\'settings\')">Instellingen</button></div>';if(st.adminTab==='overview')h+=aOverview();if(st.adminTab==='sessies')h+=aSessies();if(st.adminTab==='settings')h+=aSettings();h+='<div style="margin-top:1.5rem;text-align:center"><button style="background:none;border:none;color:#bbb;font-size:12px;cursor:pointer;font-family:inherit" onclick="V(\'student\')">&#8592; Terug naar aanmelding</button></div>';return h;}
function aOverview(){var total=st.regs.length,full=0;for(var i=0;i<st.sessions.length;i++)if(spots(st.sessions[i].id)===0)full++;var cnt={};for(var j=0;j<STUDIES.length;j++){cnt[STUDIES[j]]=0;for(var k=0;k<st.regs.length;k++)if(st.regs[k].studie===STUDIES[j])cnt[STUDIES[j]]++;}var h='<div class="grid2"><div class="stat-card"><div class="num">'+total+'</div><div class="lbl">Aanmeldingen</div></div><div class="stat-card"><div class="num">'+full+'/'+st.sessions.length+'</div><div class="lbl">Sessies vol</div></div></div><div class="grid3">'+STUDIES.map(function(s){return'<div class="stat-card"><div class="num">'+cnt[s]+'</div><div class="lbl"><span class="badge '+SB[s]+'">'+s+'</span></div></div>';}).join('')+'</div>';var ts=times(),tO='<option value="all">Alle tijden</option>';for(var ti=0;ti<ts.length;ti++)tO+='<option value="'+ts[ti]+'" '+(st.fTime===ts[ti]?'selected':'')+'>'+ts[ti]+'</option>';var sO='<option value="all">Alle studies</option>';for(var si=0;si<STUDIES.length;si++)sO+='<option value="'+STUDIES[si]+'" '+(st.fStudy===STUDIES[si]?'selected':'')+'>'+STUDIES[si]+'</option>';h+='<div class="row" style="margin-bottom:12px"><select id="ft" style="flex:1">'+tO+'</select><select id="fs" style="flex:1">'+sO+'</select></div>';var fil=[];for(var ri=0;ri<st.regs.length;ri++){var r=st.regs[ri];if(st.fTime!=='all'&&r.s1_tijd!==st.fTime&&r.s2_tijd!==st.fTime)continue;if(st.fStudy!=='all'&&r.studie!==st.fStudy)continue;fil.push(r);}if(!fil.length){h+='<div class="card" style="text-align:center;color:#666;padding:1.5rem;font-size:14px">Nog geen aanmeldingen</div>';}else{h+='<div class="card" style="padding:0;overflow:auto"><table class="atable"><thead><tr><th>Naam</th><th>Studie</th><th>Workshop 1</th><th>Workshop 2</th><th></th></tr></thead><tbody>';for(var fi=0;fi<fil.length;fi++){var r=fil[fi];h+='<tr><td style="white-space:nowrap">'+esc(r.voornaam)+' '+esc(r.achternaam)+'</td><td><span class="badge '+(SB[r.studie]||'blue')+'">'+r.studie+'</span></td><td><div style="font-size:13px;font-weight:600">'+esc(r.s1_titel)+'</div><div style="font-size:11px;color:#888">'+r.s1_tijd+' &middot; '+r.s1_lokaal+'</div></td><td><div style="font-size:13px;font-weight:600">'+esc(r.s2_titel)+'</div><div style="font-size:11px;color:#888">'+r.s2_tijd+' &middot; '+r.s2_lokaal+'</div></td><td><button class="sbtn danger" onclick="DR(\''+r.id+'\')">&#10005;</button></td></tr>';}h+='</tbody></table></div><button class="sbtn" style="margin-top:10px;padding:8px 14px;font-size:13px" onclick="EXP()">&#8595; Exporteer als CSV</button>';}return h;}
function aSessies(){var h='<div style="font-size:15px;font-weight:600;margin-bottom:12px">Titels &amp; omschrijvingen</div>';var ts=times();for(var ti=0;ti<ts.length;ti++){var t=ts[ti];h+='<div class="time-block"><div class="time-label">'+t+'</div>';for(var si=0;si<st.sessions.length;si++){var s=st.sessions[si];if(s.time!==t)continue;var ed=st.editId===s.id;h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1">'+(s.title?'<div style="font-weight:600;font-size:14px">'+esc(s.title)+'</div>':'<div class="notitle">Geen titel</div>')+(s.desc?'<div style="font-size:13px;color:#555;margin-top:3px;line-height:1.5">'+esc(s.desc)+'</div>':'')+'<div class="sc-meta" style="margin-top:6px"><span>&#128205; '+s.lokaal+'</span><span>&#128100; '+s.docenten+'</span></div></div><button class="sbtn" onclick="SE(\''+s.id+'\')">'+(ed?'Annuleer':'Bewerk')+'</button></div>'+(ed?'<div class="editform"><div class="form-row"><label>Titel</label><input id="et" type="text" placeholder="Titel" value="'+esc(st.editDraft.title||'')+'"></div><div class="form-row"><label>Omschrijving</label><textarea id="ed" placeholder="Omschrijving...">'+esc(st.editDraft.desc||'')+'</textarea></div><button class="sbtn dark" onclick="SaveE(\''+s.id+'\')">Opslaan</button></div>':'')+'</div>';}h+='</div>';}return h;}
function aSettings(){return'<div class="card"><div style="font-size:15px;font-weight:600;margin-bottom:12px">Pincode wijzigen</div><div class="form-row"><input id="np" type="password" placeholder="Nieuwe pincode (min. 4 tekens)"></div><button class="sbtn dark" style="padding:8px 16px;font-size:14px" onclick="CP()">Opslaan</button>'+(st.pinSaveMsg?'<div style="background:#dff6dd;color:#107c10;padding:10px 14px;border-radius:8px;font-size:14px;margin-top:10px">'+st.pinSaveMsg+'</div>':'')+'</div><div class="card"><div style="font-size:15px;font-weight:600;margin-bottom:8px">Alle aanmeldingen wissen</div><p style="font-size:14px;color:#555;margin-bottom:12px">Verwijdert alle inschrijvingen definitief.</p><button class="sbtn danger" onclick="CA()">Wis alle aanmeldingen</button></div><button class="sbtn" style="margin-top:12px" onclick="LO()">Uitloggen</button>';}
function attach(){var vn=document.getElementById('i-vn');if(vn)vn.addEventListener('input',function(e){st.form.voornaam=e.target.value;st.errors.voornaam=null;});var an=document.getElementById('i-an');if(an)an.addEventListener('input',function(e){st.form.achternaam=e.target.value;st.errors.achternaam=null;});var pin=document.getElementById('i-pin');if(pin)pin.addEventListener('keydown',function(e){if(e.key==='Enter')PIN();});var ft=document.getElementById('ft');if(ft)ft.addEventListener('change',function(e){st.fTime=e.target.value;render();});var fs=document.getElementById('fs');if(fs)fs.addEventListener('change',function(e){st.fStudy=e.target.value;render();});var et=document.getElementById('et');if(et)et.addEventListener('input',function(e){st.editDraft.title=e.target.value;});var ed=document.getElementById('ed');if(ed)ed.addEventListener('input',function(e){st.editDraft.desc=e.target.value;});}
window.V=function(v){st.view=v;render();};
window.GS=function(n){st.step=n;st.msg=null;render();};
window.SS=function(s){st.form.studie=s;st.errors.studie=null;render();};
window.W1=function(id){st.form.ws1=id;st.form.ws2='';st.popup=sid(id);st.popupType='ws1';render();};
window.W2=function(id){st.form.ws2=id;st.popup=sid(id);st.popupType='ws2';render();};
window.next1=function(){var vn=document.getElementById('i-vn'),an=document.getElementById('i-an');if(vn)st.form.voornaam=vn.value;if(an)st.form.achternaam=an.value;var e=validate();st.errors=e;if(Object.keys(e).length){render();return;}if(alreadyReg()){st.msg='Deze naam is al aangemeld.';render();return;}st.msg=null;st.errors={};st.step=2;render();};
window.next2=function(){if(st.form.ws1){st.step=3;render();}};
window.confirmNext=function(){st.popup=null;st.step=3;render();};
window.confirmFinish=function(){st.popup=null;finish();};
window.dismissPopup=function(){if(st.popupType==='ws1'){st.form.ws1='';}else{st.form.ws2='';}st.popup=null;render();};
window.wijzigKeuzes=function(){
  var r=st.lastReg;if(!r)return;
  sbFetch('aanmeldingen?id=eq.'+r.id,{method:'DELETE'}).catch(function(){});
  st.regs=st.regs.filter(function(x){return x.id!==r.id;});
  st.form.ws1='';st.form.ws2='';st.lastReg=null;st.popup=null;st.step=2;render();
};
window.reset=function(){st.form={voornaam:'',achternaam:'',studie:'',ws1:'',ws2:''};st.step=1;st.errors={};st.msg=null;st.lastReg=null;render();};
window.AT=function(t){st.adminTab=t;render();};
window.PIN=function(){var p=document.getElementById('i-pin');if(p&&p.value===st.adminPin){st.adminAuth=true;st.pinMsg=null;render();}else{st.pinMsg='Verkeerde pincode.';render();}};
window.LO=function(){st.adminAuth=false;render();};
window.DR=function(id){sbFetch('aanmeldingen?id=eq.'+id,{method:'DELETE'}).catch(function(){});st.regs=st.regs.filter(function(r){return r.id!==id;});render();};
window.SE=function(id){if(st.editId===id){st.editId=null;st.editDraft={};}else{var s=sid(id);st.editId=id;st.editDraft={title:s.title||'',desc:s.desc||''};}render();};
window.SaveE=function(id){var s=sid(id);if(s){s.title=st.editDraft.title||'';s.desc=st.editDraft.desc||'';}st.editId=null;st.editDraft={};lsSet('ws_sessions',st.sessions);render();};
window.CP=function(){var i=document.getElementById('np');if(!i||i.value.length<4)return;st.adminPin=i.value;lsSet('ws_pin',st.adminPin);st.pinSaveMsg='Pincode opgeslagen!';render();};
window.CA=function(){if(!confirm('Alle aanmeldingen wissen?'))return;sbFetch('aanmeldingen?id=neq.00000000-0000-0000-0000-000000000000',{method:'DELETE'}).catch(function(){});st.regs=[];render();};
window.EXP=function(){var rows=[['Voornaam','Achternaam','Studie','Workshop 1','Tijd 1','Lokaal 1','Workshop 2','Tijd 2','Lokaal 2']];for(var i=0;i<st.regs.length;i++){var r=st.regs[i];rows.push([r.voornaam,r.achternaam,r.studie,r.s1_titel,r.s1_tijd,r.s1_lokaal,r.s2_titel,r.s2_tijd,r.s2_lokaal]);}var csv=rows.map(function(row){return row.map(function(c){return'"'+(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\r\n');var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='aanmeldingen.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);};
render();
loadRegs();
</script>
</body>
</html>
